<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>动态错题复习</title>
    <style>
        :root {
            --bg-main: #F7FAFC; --bg-card: #EBF8FF; --bg-wrong: #FFF5F5;
            --accent: #319795; --wrong-red: #E53E3E; --text-main: #2D3748;
            --sub-text: #4A5568; --btn-active: #3182CE;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-main); margin: 0; padding: 0; color: var(--text-main); display: flex; flex-direction: column; height: 100vh; }
        .status-bar { background: #EDF2F7; padding: 10px 15px; display: flex; justify-content: space-between; font-size: 14px; font-weight: bold; }
        .progress-bar { text-align: center; margin: 10px 0; font-size: 14px; color: var(--sub-text); }
        .card-container { flex: 1; display: flex; flex-direction: column; padding: 15px; gap: 15px; }
        .card { background: var(--bg-card); border-radius: 12px; padding: 30px 20px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: center; min-height: 120px;}
        #lbl-cache { margin-left: 8px; font-size: 12px; opacity: 0.8; }
        .chinese { font-size: 24px; font-weight: bold; }
        .lemma { font-size: 28px; font-weight: bold; color: var(--accent); margin-bottom: 10px;}
        .sentence { font-size: 16px; color: var(--sub-text); }
        .hidden { display: none !important; }
        .btn-group { display: flex; gap: 10px; padding: 15px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-danger { background: #FED7D7; color: var(--wrong-red); }
        .btn-scope { background: #E2E8F0; color: var(--text-main); padding: 10px; font-size: 12px;}
        .scope-container { display: flex; gap: 5px; padding: 0 15px 15px 15px; overflow-x: auto;}
    </style>
</head>
<body id="app-body">

    <div class="status-bar">
        <span id="lbl-mode">📍 普通模式</span>
        <span id="lbl-wrong-count" style="color: var(--wrong-red);">❌ 待消: 0</span>
    </div>
    
    <div class="progress-bar"><span id="lbl-progress">加载中...</span><span id="lbl-cache" style="display:none"></span></div>

    <div class="card-container" id="tap-zone">
        <div class="card" id="q-card">
            <div class="chinese" id="lbl-chinese">...</div>
        </div>
        <div class="card hidden" id="a-card">
            <div class="lemma" id="lbl-lemma">...</div>
            <div class="sentence" id="lbl-sentence">...</div>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-danger" id="btn-wrong">🚩 加入错题</button>
        <button class="btn-primary" id="btn-next">查看答案</button>
    </div>

    <div class="scope-container" id="scope-btns">
        <button class="btn-scope" onclick="changeScope(1)">1天</button>
        <button class="btn-scope" onclick="changeScope(3)" style="background: var(--btn-active); color: white;">3天</button>
        <button class="btn-scope" onclick="changeScope(5)">5天</button>
        <button class="btn-scope" onclick="changeScope(0)">全部</button>
        <button class="btn-scope" id="btn-toggle-mode" onclick="toggleMode()" style="background: #E53E3E; color: white;">切错题模式</button>
    </div>

<script>
    const CACHE_KEY = 'vocab_cache_v1';
    const CACHE_HOURS = 12;
    const CACHE_MS = CACHE_HOURS * 3600000;

    let allTables = [];
    let fullPool = [];
    let wrongSet = [];
    let currentIdx = 0;
    let currentDays = 3;
    let isWrongMode = false;
    let showAnswer = false;
    let hasRemarked = false;
    let wordBankHash = '';

    function simpleHash(str) {
        let h = 0;
        for (let i = 0; i < str.length; i++) {
            h = ((h << 5) - h) + str.charCodeAt(i);
            h |= 0;
        }
        return h.toString(36);
    }

    function parseTables(text) {
        const tables = [];
        let cur = [];
        let inT = false;
        text.split('\n').forEach(line => {
            line = line.trim();
            if (line.startsWith('|')) {
                if (!inT) { inT = true; cur = []; tables.push(cur); }
                if (!line.includes('---')) {
                    const parts = line.split('|').map(p => p.trim()).filter(p => p);
                    if (parts.length >= 3 &&
                        !parts[0].includes("Lemma Form") &&
                        !parts[0].includes("Standard Lemma") &&
                        !parts[0].includes("标准词组")) {
                        cur.push({ lemma: parts[0], sentence: parts[1], chinese: parts[2] });
                    }
                }
            } else { inT = false; }
        });
        return tables.filter(t => t.length > 0);
    }

    function showCacheMsg(msg) {
        const el = document.getElementById('lbl-cache');
        el.textContent = msg;
        el.style.display = '';
        setTimeout(function() { el.style.display = 'none'; }, 4000);
    }

    function autoSave() {
        try {
            localStorage.setItem(CACHE_KEY, JSON.stringify({
                t: Date.now(),
                h: wordBankHash,
                ws: wrongSet,
                ci: currentIdx,
                cd: currentDays,
                wm: isWrongMode,
                fp: fullPool,
                at: allTables
            }));
        } catch (e) {}
    }

    function loadCache() {
        try {
            var raw = localStorage.getItem(CACHE_KEY);
            if (!raw) return null;
            var c = JSON.parse(raw);
            if (Date.now() - c.t > CACHE_MS) {
                localStorage.removeItem(CACHE_KEY);
                return null;
            }
            return c;
        } catch (e) { return null; }
    }

    function restoreCache(c) {
        allTables = c.at || [];
        fullPool = c.fp || [];
        wrongSet = c.ws || [];
        currentIdx = c.ci || 0;
        currentDays = c.cd || 3;
        isWrongMode = c.wm || false;
        wordBankHash = c.h || '';
    }

    function syncWrongSet(newTables) {
        var lemmaMap = new Map();
        newTables.flat().forEach(function(item) { lemmaMap.set(item.lemma, item); });
        wrongSet = wrongSet.filter(function(w) { return lemmaMap.has(w.lemma); }).map(function(w) { return lemmaMap.get(w.lemma); });
    }

    async function loadData() {
        var cache = loadCache();
        var restored = false;

        if (cache) {
            restoreCache(cache);
            applyScopeBtns(currentDays);
            if (isWrongMode) {
                document.body.style.backgroundColor = "var(--bg-wrong)";
                document.getElementById('lbl-mode').innerText = "📍 错题强化";
                document.getElementById('lbl-wrong-count').innerText = '❌ 待消: ' + wrongSet.length;
                document.getElementById('btn-toggle-mode').textContent = '切回普通模式';
            }
            updateUI();
            showCacheMsg('📦 已恢复上次进度');
            restored = true;
        }

        try {
            var resp = await fetch('./生词本.md?' + Date.now());
            var text = await resp.text();
            var newHash = simpleHash(text);
            var hashChanged = !wordBankHash || newHash !== wordBankHash;

            if (hashChanged) {
                var newTables = parseTables(text);
                allTables = newTables;
                wordBankHash = newHash;
                if (restored) syncWrongSet(newTables);
                initPool(currentDays);
                showCacheMsg(restored ? '🔄 词库已更新' : '');
            } else if (!restored) {
                allTables = parseTables(text);
                wordBankHash = newHash;
                initPool(currentDays);
            }

            autoSave();
            applyScopeBtns(currentDays);
            if (isWrongMode) {
                document.body.style.backgroundColor = "var(--bg-wrong)";
                document.getElementById('lbl-mode').innerText = "📍 错题强化";
                document.getElementById('btn-toggle-mode').textContent = '切回普通模式';
            }
            updateUI();
        } catch (e) {
            if (restored) {
                showCacheMsg('📡 离线，使用缓存');
                updateUI();
            } else {
                document.getElementById('lbl-chinese').innerText = "加载失败，请检查网络";
            }
        }
    }

    function initPool(days) {
        currentDays = days;
        var tablesToUse = days === 0 ? allTables : allTables.slice(0, days);
        fullPool = tablesToUse.flat().sort(function() { return Math.random() - 0.5; });
        currentIdx = 0;
        if (isWrongMode) {
            isWrongMode = false;
            document.body.style.backgroundColor = "var(--bg-main)";
            document.getElementById('lbl-mode').innerText = "📍 普通模式";
            document.getElementById('btn-toggle-mode').textContent = '切错题模式';
        }
    }

    function applyScopeBtns(days) {
        var btns = document.querySelectorAll('.scope-container button');
        btns.forEach(function(b) {
            var label = b.textContent.trim();
            if (label === '切错题模式' || label === '切回普通模式') return;
            var match = (days === 0 && label === '全部') ||
                        (days === 1 && label === '1天') ||
                        (days === 3 && label === '3天') ||
                        (days === 5 && label === '5天');
            if (match) {
                b.style.background = 'var(--btn-active)';
                b.style.color = 'white';
            } else {
                b.style.background = '#E2E8F0';
                b.style.color = 'var(--text-main)';
            }
        });
    }

    function updateUI() {
        hasRemarked = false;
        var item;

        if (!isWrongMode) {
            if (currentIdx >= fullPool.length) {
                if (wrongSet.length > 0) {
                    alert("当前范围已过完，进入错题强化！");
                    toggleMode(true);
                } else {
                    alert("复习完毕！");
                }
                return;
            }
            item = fullPool[currentIdx];
            document.getElementById('lbl-progress').innerText = '[' + (currentDays===0?'全部':('近'+currentDays+'天')) + '] 进度: ' + (currentIdx + 1) + ' / ' + fullPool.length;
        } else {
            if (wrongSet.length === 0) {
                alert("错题清空！返回普通模式。");
                toggleMode(false);
                return;
            }
            item = wrongSet[0];
            document.getElementById('lbl-progress').innerText = '错题模式 - 剩余: ' + wrongSet.length;
        }

        document.getElementById('lbl-chinese').innerText = item.chinese;
        document.getElementById('a-card').classList.add('hidden');
        document.getElementById('btn-next').innerText = "查看答案";
        showAnswer = false;

        var btnWrong = document.getElementById('btn-wrong');
        if (!isWrongMode) {
            var inWrong = wrongSet.some(function(w) { return w.lemma === item.lemma; });
            btnWrong.innerText = inWrong ? "✅ 已在错题" : "🚩 加入错题";
            btnWrong.disabled = inWrong;
            btnWrong.style.opacity = inWrong ? "0.5" : "1";
        } else {
            btnWrong.innerText = "🔥 没记住,保留";
            btnWrong.disabled = false;
            btnWrong.style.opacity = "1";
        }
    }

    function handleNext() {
        if (!showAnswer) {
            var item = isWrongMode ? wrongSet[0] : fullPool[currentIdx];
            document.getElementById('a-card').classList.remove('hidden');
            document.getElementById('lbl-lemma').innerText = item.lemma;
            document.getElementById('lbl-sentence').innerText = item.sentence;
            document.getElementById('btn-next').innerText = "下一题";
            showAnswer = true;
        } else {
            if (isWrongMode) {
                var currentItem = wrongSet.shift();
                if (hasRemarked) wrongSet.push(currentItem);
                document.getElementById('lbl-wrong-count').innerText = '❌ 待消: ' + wrongSet.length;
            } else {
                currentIdx++;
            }
            autoSave();
            updateUI();
        }
    }

    function markWrong() {
        if (document.getElementById('btn-wrong').disabled) return;
        if (!isWrongMode) {
            var item = fullPool[currentIdx];
            if (!wrongSet.some(function(w) { return w.lemma === item.lemma; })) {
                wrongSet.push(item);
                document.getElementById('lbl-wrong-count').innerText = '❌ 待消: ' + wrongSet.length;
                document.getElementById('btn-wrong').innerText = "✅ 已加入";
                document.getElementById('btn-wrong').disabled = true;
                document.getElementById('btn-wrong').style.opacity = "0.5";
                autoSave();
            }
        } else {
            hasRemarked = true;
            document.getElementById('btn-wrong').innerText = "♻️ 末尾重现";
            document.getElementById('btn-wrong').disabled = true;
        }
    }

    function toggleMode(forceWrong) {
        if (forceWrong === undefined) forceWrong = null;
        if (forceWrong === true || (!isWrongMode && forceWrong !== false)) {
            if (wrongSet.length === 0) { alert("错题本为空"); return; }
            isWrongMode = true;
            document.body.style.backgroundColor = "var(--bg-wrong)";
            document.getElementById('lbl-mode').innerText = "📍 错题强化";
            document.getElementById('btn-toggle-mode').textContent = '切回普通模式';
        } else {
            isWrongMode = false;
            document.body.style.backgroundColor = "var(--bg-main)";
            document.getElementById('lbl-mode').innerText = "📍 普通模式";
            document.getElementById('btn-toggle-mode').textContent = '切错题模式';
        }
        autoSave();
        updateUI();
    }

    function changeScope(days) {
        if (isWrongMode) { alert("请先退出错题模式再切换范围"); return; }
        if (currentIdx > 0 && currentIdx < fullPool.length) {
            if (!confirm("切换将重置进度，确认吗？")) return;
        }
        initPool(days);
        applyScopeBtns(days);
        autoSave();
        updateUI();
    }

    document.getElementById('btn-next').addEventListener('click', handleNext);
    document.getElementById('btn-wrong').addEventListener('click', markWrong);
    document.getElementById('tap-zone').addEventListener('click', handleNext);

    loadData();
</script>
</body>
</html>
